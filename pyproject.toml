[tool.uv.workspace]
members = ["apps/api", "packages/quant-core"]

[tool.uv.sources]
quant-core = { workspace = true }

[dependency-groups]
dev = [
  "hypothesis==6.156.6",
  "mypy==2.3.0",
  "pytest==9.1.1",
  "pytest-asyncio==1.4.0",
  "pytest-cov==7.1.0",
  "ruff==0.15.21",
]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["apps/api/alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ASYNC", "RUF"]
ignore = ["B008"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
mypy_path = ["packages/quant-core/src", "apps/api/src"]
exclude = ["apps/api/alembic"]

[[tool.mypy.overrides]]
module = ["celery.*", "exchange_calendars.*", "oci.*", "scipy.*", "yfinance.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = "-ra --strict-markers --strict-config"
testpaths = ["packages/quant-core/tests", "apps/api/tests"]
asyncio_mode = "auto"
markers = [
  "integration: requires the disposable Docker Compose PostgreSQL service",
]
filterwarnings = [
  "ignore:Using `httpx` with `starlette.testclient` is deprecated:starlette.exceptions.StarletteDeprecationWarning",
]

[tool.coverage.run]
branch = true
source = ["quant_core", "quant_api"]
omit = ["*/quant_api/cli.py", "*/quant_api/worker.py"]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 80
