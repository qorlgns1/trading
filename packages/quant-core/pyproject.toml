[project]
name = "quant-core"
version = "0.1.0"
description = "Deterministic trend scoring and portfolio backtesting core"
requires-python = ">=3.12"
dependencies = [
  "duckdb==1.5.4",
  "exchange-calendars>=4.11,<5",
  "numpy>=2.2,<3",
  "polars==1.42.1",
  "pyarrow>=19,<23",
  "scipy==1.18.0",
  "yfinance==1.5.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quant_core"]
