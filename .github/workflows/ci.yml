name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.8.22"
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --locked --all-packages --all-groups
      - run: uv run ruff check packages/quant-core apps/api
      - run: uv run mypy packages/quant-core/src apps/api/src
      - name: Run Python tests with coverage
        run: >-
          uv run pytest --cov
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-report=json:coverage.json
      - name: Publish coverage summary
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -f .coverage ]]; then
            {
              echo "## Python coverage"
              uv run coverage report --format=markdown --sort=cover --precision=2 || true
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Python coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "Coverage data was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            coverage.xml
            coverage.json
          if-no-files-found: ignore
          retention-days: 14

  api-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.8.22"
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
      - run: uv sync --locked --all-packages --all-groups
      - run: pnpm install --frozen-lockfile
      - run: uv run python scripts/export_openapi.py
      - run: pnpm --filter web generate:api
      - run: git diff --exit-code -- openapi.json apps/web/src/lib/api-schema.d.ts

  web-quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web test
      - run: pnpm --filter web build

  postgres-integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.8.22"
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --locked --all-packages --all-groups
      - run: make test-integration

  images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, api-contract, web-quality, postgres-integration]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      matrix:
        image:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Validate OCIR configuration
        if: ${{ vars.OCI_DEPLOY_ENABLED == 'true' }}
        shell: bash
        env:
          OCIR_REGISTRY: ${{ vars.OCIR_REGISTRY }}
          OCI_NAMESPACE: ${{ vars.OCI_NAMESPACE }}
          OCIR_USERNAME: ${{ secrets.OCIR_USERNAME }}
          OCIR_AUTH_TOKEN: ${{ secrets.OCIR_AUTH_TOKEN }}
        run: |
          missing=()
          for name in OCIR_REGISTRY OCI_NAMESPACE OCIR_USERNAME OCIR_AUTH_TOKEN; do
            [[ -n "${!name}" ]] || missing+=("$name")
          done
          if (( ${#missing[@]} )); then
            printf 'Missing required OCI deployment settings: %s\n' "${missing[*]}" >&2
            exit 1
          fi
      - name: Log in to OCIR
        if: ${{ vars.OCI_DEPLOY_ENABLED == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ vars.OCI_DEPLOY_ENABLED == 'true' }}
          tags: ${{ vars.OCI_DEPLOY_ENABLED == 'true' && format('{0}/{1}/quant-trend-lab/{2}:{3}', vars.OCIR_REGISTRY, vars.OCI_NAMESPACE, matrix.image.name, github.sha) || format('quant-trend-lab/{0}:{1}', matrix.image.name, github.sha) }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
